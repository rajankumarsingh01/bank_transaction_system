services:
  redis:
    image: redis:7-alpine
    container_name: ledger-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    container_name: ledger-ml-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - FRAUD_SCORE_THRESHOLD=0.7

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - ML_SERVICE_URL=http://ml-service:8001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  redis-data: