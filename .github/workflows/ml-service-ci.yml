name: ML Service CI

on:
  push:
    branches: [ main ]
    paths:
      - "ml-service/**"
  pull_request:
    branches: [ main ]
    paths:
      - "ml-service/**"

jobs:
  train-and-verify:
    name: Train Model & Verify Service Starts
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ml-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate training data
        run: python train/generate_data.py

      - name: Train model
        run: python train/train_model.py

      - name: Verify FastAPI app imports correctly
        run: python -c "from app.main import app; print('✅ App imported successfully')"

  docker-build:
    name: Verify Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (to pre-train model for Docker context)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and train model
        working-directory: ./ml-service
        run: |
          pip install -r requirements.txt
          python train/generate_data.py
          python train/train_model.py

      - name: Build Docker image
        working-directory: ./ml-service
        run: docker build -t fraud-ml-service:ci-test .